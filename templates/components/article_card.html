<div class="card text-start">
    <div class="card-body">
        <h4 class="card-title">{{article.title}}</h4>
        <p class="card-text">{{article.content|truncatechars:200}}</p>
        <a name="Read {{article.title}}" class="btn btn-primary" 
        href="{% url 'articles:detail' article.slug%}" >
            Read Article
        </a>
    </div>
</div>
